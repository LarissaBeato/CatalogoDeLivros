<header class="header">
  <div class="logo">Catálogo de Livros</div>
  <nav class="menu">
    <a routerLink="/">Home</a>
    @if (autenticado) {
    <a routerLink="/cadastrar-livro">Cadastrar Livro</a>
    <a routerLink="/livros">Listar Livros</a>
    <span class="user-name">Olá, {{ userName }}</span>
    <button (click)="logout()" class="logout-btn">Sair</button>
    } @else {
    <a routerLink="/login">Login</a>
    }
  </nav>
</header>
